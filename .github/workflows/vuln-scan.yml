name: Vulnerability Scan

on:
  schedule:
    - cron: "0 8 * * 1"   # every Monday at 08:00 UTC
  workflow_dispatch:        # allow manual trigger from the Actions tab

permissions:
  contents: write   # needed to delete releases/tags and create new ones
  id-token: write   # needed for OIDC in the downstream release job

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full tag history

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan for vulnerabilities
        id: scan
        # govulncheck exits non-zero when it finds vulnerabilities that affect
        # the call graph (i.e. code you actually call, not just imports).
        # The output lists the CVE/GHSA ID, affected symbol, and fix version.
        # continue-on-error lets us run the retraction step before failing.
        continue-on-error: true
        run: |
          echo "Running govulncheck against all packages..."
          govulncheck ./...
          echo "vuln_found=false" >> "$GITHUB_OUTPUT"

      - name: Set vuln flag
        if: steps.scan.outcome == 'failure'
        run: echo "vuln_found=true" >> "$GITHUB_OUTPUT"
        id: flag

      - name: Retract all releases — vulnerable binaries must not remain available
        if: steps.scan.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::warning::Vulnerabilities found — retracting all published releases."

          # List every release (id + tag). gh returns JSON array.
          RELEASES=$(gh release list --json tagName,databaseId --limit 100)
          COUNT=$(echo "$RELEASES" | jq length)

          if [ "$COUNT" -eq 0 ]; then
            echo "No published releases to retract."
          else
            echo "Retracting ${COUNT} release(s)..."
            echo "$RELEASES" | jq -r '.[].tagName' | while read -r TAG; do
              echo "  Deleting release and tag: ${TAG}"
              # Delete the GitHub Release (assets + release record).
              gh release delete "${TAG}" --yes --cleanup-tag || true
            done
            echo "All releases retracted."
          fi

          echo ""
          echo "ACTION REQUIRED: Update the Go version or affected dependency,"
          echo "then push a new version tag to publish clean binaries."

      - name: Fail the workflow — vulnerabilities found
        if: steps.scan.outcome == 'failure'
        run: |
          echo "::error::govulncheck found active vulnerabilities in the call graph."
          echo "All published releases have been retracted."
          echo "Fix the issue and push a new tag to re-publish."
          exit 1

      - name: No vulnerabilities found — trigger release rebuild
        # Only reached when govulncheck exits 0 (clean).
        # Pushes a dated patch tag so the release workflow rebuilds and
        # publishes fresh binaries with the same source but up-to-date deps.
        run: |
          # Determine the latest semver tag, then bump the patch version.
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            echo "No semver tag found — skipping rebuild trigger."
            exit 0
          fi

          MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"

          # Only push a new tag if the latest tag is more than 6 days old,
          # to avoid creating a release on every weekly run when nothing changed.
          LATEST_DATE=$(git log -1 --format="%ct" "$LATEST")
          NOW=$(date +%s)
          AGE=$(( (NOW - LATEST_DATE) / 86400 ))

          if [ "$AGE" -lt 6 ]; then
            echo "Latest tag ${LATEST} is only ${AGE} day(s) old — skipping rebuild."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${NEW_TAG}" -m "Scheduled rebuild — no vulnerabilities found (vuln-scan)"
          git push origin "${NEW_TAG}"
          echo "Pushed ${NEW_TAG} — release workflow will rebuild binaries."
